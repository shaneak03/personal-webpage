name: Deploy personal-webpage

on:
  push:
    branches:
      - release
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        type: choice
        options:
          - release

concurrency:
  group: deploy-${{ github.ref_name || inputs.target }}
  cancel-in-progress: true

jobs:
  deploy-release:
    if: github.ref_name == 'release' || inputs.target == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy release over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            export DEPLOY_BRANCH=release
            export DEPLOY_PATH=${{ secrets.VPS_RELEASE_PATH || '/opt/personal-webpage-release' }}
            export DEPLOY_COMPOSE_FILE=docker-compose.release.yml
            bash "$DEPLOY_PATH/deploy/deploy.sh"
